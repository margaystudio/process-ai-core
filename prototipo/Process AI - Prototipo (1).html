document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Aprobar documento<\u002Fbutton>\n                      <div style=\"display:flex; gap:9px; margin-top:2px;\">\n                        <button onclick=\"{{ onApSaveReview }}\" style=\"flex:1; display:inline-flex; align-items:center; justify-content:center; gap:7px; height:40px; border:1px solid #D2D6D8; border-radius:10px; background:#fff; color:#4C4F51; font-size:12.5px; font-weight:700; font-family:inherit; cursor:pointer;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6A6E70\" stroke-width=\"2\"><path d=\"M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z\"><\u002Fpath><path d=\"M17 21v-8H7v8M7 3v5h8\"><\u002Fpath><\u002Fsvg>Guardar y seguir luego<\u002Fbutton>\n                        <button onclick=\"{{ onApCancelReview }}\" style=\"flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; gap:6px; height:40px; padding:0 14px; border:1px solid #E5E8EA; border-radius:10px; background:#fff; color:#8A8F91; font-size:12.5px; font-weight:700; font-family:inherit; cursor:pointer;\" title=\"Liberar el documento para otro aprobador\">Cancelar<\u002Fbutton>\n                      <\u002Fdiv>\n                      <div style=\"display:flex; align-items:center; gap:6px; font-size:11px; color:#8A8F91; margin-top:2px; justify-content:center;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#48569C\" stroke-width=\"2\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>Reservado para vos mientras lo revisás.<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- C · FIN (resultado) -->\n          <sc-if value=\"{{ apDoneView }}\" hint-placeholder-va svg>Habilitó a <strong style=\"color:#232627;\">Tyto<\u002Fstrong> para usar este documento como fuente oficial.<\u002Fdiv>\n                    <div style=\"display:flex; align-items:center; gap:10px; font-size:13px; color:#37393A;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2F9E62\" stroke-width=\"2.4\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Generó las <strong style=\"color:#232627;\">relaciones sugeridas<\u002Fstrong> para la red documental.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px; color:#AEB3B5; margin-bottom:18px;\">Tu trabajo como aprobador termina acá. A continuación, el sistema enriquece la red documental.<\u002Fdiv>\n                  <div style=\"display:flex; gap:11px; justify-content:center;\">\n                    <button onclick=\"{{ onApBackInbox }}\" style=\"height:44px; padding:0 20px; border:1px solid #D2D6D8; border-radius:10px; background:#fff; color:#4C4F51; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;\">Volver a pendientes<\u002Fbutton>\n                    <button onclick=\"{{ onGoEnrich }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:44px; padding:0 20px; border:none; border-radius:10px; background:#48569C; color:#fff; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;\">Ver enriquecimiento<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ apResultChanges }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:16px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:30px 30px; text-align:center;\">\n                  <span style=\"width:56px; height:56px; border-radius:50%; background:#9A6A00; display:inline-grid; place-items:center; margin-bottom:16px;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M3 2v6h6\"><\u002Fpath><path d=\"M3.51 15a9 9 0 1 0 2.13-9.36L3 8\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <div style=\"font-size:21px; font-weight:800; color:#232627; margin-bottom:6px;\">Cambios solicitados<\u002Fdiv>\n                  <div style=\"font-size:13.5px; color:#8A8F91; margin-bottom:22px;\">“Cierre de caja” volvió a <strong style=\"color:#37393A;\">Martín Díaz<\u002Fstrong> con tus observaciones.<\u002Fdiv>\n                  <div style=\"text-align:left; display:flex; flex-direction:column; gap:11px; background:#FAFBFC; border:1px solid #EDEFF1; border-radius:12px; padding:16px 18px; margin-bottom:22px;\">\n                    <div style=\"display:flex; align-items:center; gap:10px; font-size:13px; color:#37393A;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9A6A00\" stroke-width=\"2.2\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>El documento recuperó el estado de <strong style=\"color:#232627;\">borrador<\u002Fstrong>.<\u002Fdiv>\n                    <div style=\"display:flex; align-items:center; gap:10px; font-size:13px; color:#37393A;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9A6A00\" stroke-width=\"2.2\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>El autor puede editarlo y volver a enviarlo a aprobación.<\u002Fdiv>\n                    <div style=\"display:flex; align-items:center; gap:10px; font-size:13px; color:#37393A;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9A6A00\" stroke-width=\"2.2\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>Tyto no usa este documento hasta que se apruebe una versión.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ onApBackInbox }}\" style=\"height:44px; paddin n\n              <div style=\"display:grid; grid-template-columns:1fr 380px; gap:16px; align-items:start;\">\n                <!-- documento protagonista -->\n                <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); overflow:hidden;\">\n                  <div style=\"padding:13px 22px; border-bottom:1px solid #EDEFF1; display:flex; align-items:center; gap:9px;\">\n                    <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:#1E7A47; background:#E7F4ED; border:1px solid #BBE0C9; padding:3px 9px; border-radius:999px;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F8A55\" stroke-width=\"2.6\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Documento oficial · v1<\u002Fspan>\n                    <span style=\"font-size:15px; font-weight:800; color:#232627; margin-left:4px;\">Cierre de caja<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"padding:22px 26px;\">\n                    <sc-for list=\"{{ apBlocks }}\" as=\"b\" hint-placeholder-count=\"7\">\n                      <div style=\"{{ b.blockStyle }}\">{{ b.text }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- panel de sugerencias -->\n                <div style=\"display:flex; flex-direction:column; gap:14px;\">\n                  <!-- mini red -->\n                  <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:14px 16px;\">\n                    <div style=\"font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:#8A8F91; margin-bottom:8px;\">Red documental<\u002Fdiv>\n                    <svg width=\"100%\" height=\"150\" viewBox=\"0 0 340 150\" style=\"display:block;\">\n                      <line x1=\"170\" y1=\"75\" x2= ne; border:none; cursor:pointer; font-family:inherit; text-decoration:underline;\">Deshacer<\u002Fbutton><\u002Fdiv><\u002Fsc-if>\n                          <sc-if value=\"{{ s.pending }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"display:flex; gap:8px;\"><button onclick=\"{{ s.onAccept }}\" style=\"flex:1; height:36px; border:none; border-radius:8px; background:#1F8A55; color:#fff; font-size:12.5px; font-weight:700; font-family:inherit; cursor:pointer;\">Aceptar<\u002Fbutton><button onclick=\"{{ s.onReject }}\" style=\"height:36px; padding:0 13px; border:1px solid #E5E8EA; border-radius:8px; background:#fff; color:#8A8F91; font-size:12.5px; font-weight:600; font-family:inherit; cursor:pointer;\">Descartar<\u002Fbutton><\u002Fdiv><\u002Fsc-if>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fsc-if>\n\n                  <sc-if value=\"{{ enrichAllDone }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div class=\"msg-anim\" style=\"background:#fff; border:1px solid #BBE0C9; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:20px 18px;\">\n                      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\"><span style=\"width:34px; height:34px; border-radius:9px; background:#1F8A55; display:grid; place-items:center;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:16px; font-weight:800; color:#232627;\">Red documental enriquecida<\u002Fspan><\u002Fdiv>\n                      <div style=\"display:flex; flex-direction:column; gap:9px; margin-bottom:16px;\">\n                        <sc-for list=\"{{ enrichSummary }}\" as=\"r\" hint-placeholder-count=\"3\">\n                          <div style=\"display:flex; align-items:center; gap:9px; font-size:13px; color:#37393A;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1F8A55\" stroke-width=\"2.4\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><strong style=\"color:#232627;\">{{ r.n }}<\u002Fstrong> {{ r.label }}<\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                      <div style=\"font-size:12px; line-height:1.5; color:#6A6E70; background:#FAFBFC; border:1px solid #EDEFF1; border-radius:10px; padding:11px 13px; margin-bottom:16px;\">Tyto ahora dispone de un conocimiento más rico y conectado para responder consultas.<\u002Fdiv>\n                      <button onclick=\"{{ onApBackInbox }}\" style=\"width:100%; height:44px; border:none; border-radius:10px; background:#37393A; color:#fff; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;\">Finalizar<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ generating }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:520px; margin:0 auto; padding:64px 30px; display:flex; flex-direction:column; align-items:center;\">\n            <span style=\"position:relative; width:56px; height:56px; display:grid; place-items:center; margin-bottom:18px;\"><span style=\"position:absolute; inset:0; border-radius:50%; background:rgba(173,185,223,.45); animation:tytoPulse 2s ease-out infinite;\"><\u002Fspan><svg class=\"spin\" width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#48569C\" stroke-width=\"2.2\"><path d=\"M21 12a9 9 0 1 1-6.2-8.5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <div style=\"font-size:20px; font-weight:800; color:#232627; margin-bottom:4px;\">La IA está armando el borrador<\u002Fdiv>\n            <div style=\"font-size:13px; color:#8A8F91; margin-bottom:26px; text-align:center;\">Un momento — esto lo hace el sistema con las evidencias que cargaste.<\u002Fdiv>\n            <div style=\"width:100%; display:flex; flex-direction:column; gap:13px;\">\n              <sc-for list=\"{{ genSteps }}\" as=\"gs\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex; align-items:center; gap:12px;\">\n                  <span style=\"{{ gs.iconWrap }}\">\n                    <sc-if value=\"{{ gs.done }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.8\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                    <sc-if value=\"{{ gs.active }}\" hint-placeholder-val=\"{{ true }}\"><svg class=\"spin\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#48569C\" stroke-width=\"2.6\"><path d=\"M21 12a9 9 0 1 1-6.2-8.5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                  <\u002Fspan>\n                  <span style=\"{{ gs.labelStyle }}\">{{ gs.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ IMPORTAR DOCUMENTACIÓN ============ -->\n        <sc-if value=\"{{ isImport }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:{{ impMaxW }}; margin:0 auto; padding:26px 30px 60px;\">\n\n            <!-- persistent: documento original = fuente de verdad -->\n            <div style=\"display:flex; align-items:flex-start; gap:13px; background:rgba(173,185,223,.12); border:1px solid #D2CFE6; border-radius:13px; padding:14px 18px; margin-bottom:22px;\">\n              <span style=\"width:34px; height:34px; border-radius:9px; background:#fff; border:1px solid #D2CFE6; color:#48569C; display:grid; place-items:center; flex-shrink:0;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v font-size:14px; font-weight:600; color:#37393A; font-family:inherit; outline:none;\">\n                  <div style=\"font-size:11.5px; color:#AEB3B5; margin-top:7px;\">Queda registrada como un lote para auditoría (fecha, usuario, resultados). Ej: <span style=\"font-family:'JetBrains Mono',monospace;\">Importación #24<\u002Fspan>.<\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px;\">\n                  <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:20px 22px;\">\n                    <div style=\"font-size:13px; font-weight:700; color:#232627; margin-bottom:8px;\">Carpeta destino<\u002Fdiv>\n                    <div style=\"position:relative;\">\n                      <select value=\"{{ impFolder }}\" onchange=\"{{ onImpFolder }}\" style=\"width:100%; height:44px; border:1px solid #D2D6D8; border-radius:10px; padding:0 36px 0 13px; font-size:13.5px; font-weight:600; color:#37393A; font-family:inherit; background:#fff; -webkit-appearance:none; appearance:none; outline:none; cursor:pointer;\">\n                        <sc-for list=\"{{ impFolderOptions }}\" as=\"f\" hint-placeholder-count=\"4\"><option value=\"{{ f }}\">{{ f }}<\u002Foption><\u002Fsc-for>\n                      <\u002Fselect>\n                      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#AEB3B5\" stroke-width=\"2\" style=\"position:absolute; right:13px; top:15px; pointer-events:none;\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:20px 22px;\">\n                    <div style=\"font-size:13px; font-weight:700; color:#232627; margin-bottom:8px;\">Tipo documental<\u002Fdiv>\n                    <div style=\"position:relative;\">\n                      <select value=\"{{ impTipo }}\" onchange=\"{{ onImpTipo }}\" style=\"width:100%; height:44px; border:1px solid #D2D6D8; border-radius:10px; padding:0 36px 0 13px; font-size:13.5px; font-weight:600; color:#37393A; font-family:inherit; background:#fff; -webkit-appearance:none; appearance:none; outline:none; cursor:pointer;\">\n                        <sc-for list=\"{{ impTipoOptions }}\" as=\"t\" hint-placeholder-count=\"5\"><option value=\"{{ t }}\">{{ t }}<\u002Foption><\u002Fsc-for>\n                      <\u002Fselect>\n                      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#AEB3B5\" stroke-width=\"2\" style=\"position:absolute; right:13px; top:15px; pointer-events:none;\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:20px 22px; margin-bottom:18px;\">\n                  <div style=\"display:flex; align-items:flex-start; gap:13px;\">\n                    <div style=\"flex:1; min-width:0;\">\n                      <div style=\"font-size:13px; font-weight:700; color:#232627; margin-bottom:3px;\">Disponible para consultas inteligentes<\u002Fdiv>\n                      <div style=\"font-size:12px; line-height:1.45; color:#8A8F91;\">Si lo desactivás, Tyto y los asistentes no usarán estos documentos para responder consultas inteligentes.<\u002Fdiv>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ onImpToggleSmart }}\" role=\"switch\" aria-checked=\"{{ impSmart }}\" style=\"{{ impSmartSwitchStyle }}\"><span style=\"{{ impSmartKnobStyle }}\"><\u002Fspan><\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:20px 22px;\">\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:4px;\"><span style=\"font-size:13px; font-weight:700; color:#232627;\">Aprobadores<\u002Fspan><span style=\"font-size:11px; font-weight:700; color:#48569C; background:rgba(173,185,223,.2); padding:2px 9px; border-radius:999px;\">Sugeridos según carpeta<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:12px; color:#8A8F91; margin-bottom:14px;\">Quiénes deberán aprobar estos documentos. Roles o personas.<\u002Fdiv>\n                  <div style=\"display:flex; flex-direction:column; gap:8px;\">\n                    <sc-for list=\"{{ impApprovers }}\" as=\"ap\" hint-placeholder-count=\"4\">\n                      <button onclick=\"{{ ap.onToggle }}\" style=\"{{ ap.rowStyle }}\">\n                        <span style=\"{{ ap.avatarStyle }}\">{{ ap.avatar }}<\u002Fspan>\n                        <div style=\"flex:1; min-width:0; text-align:left;\"><div style=\"font-size:13px; font-weight:700; color:#37393A;\">{{ ap.name }}<\u002Fdiv><div style=\"font-size:11.5px; color:#8A8F91;\">{{ ap.meta }}<\u002Fdiv><\u002Fdiv>\n                        <sc-if value=\"{{ ap.suggested }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px; font-weight:700; color:#9A6A00; background:#FBF3DD; border:1px solid #F0DCA0; padding:2px 7px; border-radius:6px;\">sugerido<\u002Fspan><\u002Fsc-if>\n                        <span style=\"{{ ap.checkStyle }}\"><sc-if value=\"{{ ap.sel }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if><\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:flex; align-items:center; justify-content:flex-end; gap:12px; margin-top:24px;\">\n                  <span style=\"font-size:12.5px; color:#8A8F91; margin-right:auto;\">La IA nunca decide estos aspectos. Puede sugerir cambios; la decisión siempre es tuya.<\u002Fspan>\n                  <button onclick=\"{{ onImpTo2 }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:46px; padding:0 22px; border:none; border-radius:11px; background:#37393A; color:#fff; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;\">Incorporar documentación<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== IMP STEP 2 · INCORPORAR ===== -->\n            <sc-if value=\"{{ impIs2 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div class=\"msg-anim\">\n                <div style=\"margin-bottom:18px;\"><div style=\"font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8A8F91; margin-bottom:6px;\">Paso 2 · Incorporar<\u002Fdiv><div style=\"font-size:24px; font-weight:800; color:#232627;\">Sumá la documentación existente<\u002Fdiv><\u002Fdiv>\n\n                <!-- config recap -->\n                <div style=\"display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px;\">\n                  <span style=\"font-size:11.5px; color:#8A8F91;\">Se aplicará:<\u002Fspan>\n                  <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:#48569C; background:rgba(173,185,223,.16); border:1px solid #D2CFE6; padding:4px 10px; border-radius:999px;\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-7l-2-2H5a2 2 0 0 0-2 2z\"><\u002Fpath><\u002Fsvg>{{ impFolder }}<\u002Fspan>\n                  <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:#48569C; background:rgba(173,185,223,.16); border:1px solid #D2CFE6; padding:4px 10px; border-radius:999px;\">{{ impTipo }}<\u002Fspan>\n                  <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:#48569C; background:rgba(173,185,223,.16); border:1px solid #D2CFE6; padding:4px 10px; border-radius:999px;\">Consultas IA: {{ impSmartLabel }}<\u002Fspan>\n                  <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:#48569C; background:rgba(173,185,223,.16); border:1px solid #D2CFE6; padding:4px 10px; border-radius:999px;\">{{ impApproversSummary }}<\u002Fspan>\n                  <button onclick=\"{{ onImpBack1 }}\" style=\"font-size:11.5px; font-weight:700; color:#48569C; background:none; border:none; cursor:pointer; font-family:inherit; padding:0 4px;\">Editar<\u002Fbutton>\n                <\u002Fdiv>\n\n                <!-- dropzone -->\n                <div ondrop=\"{{ onImpDrop }}\" ondragover=\"{{ onImpDragOver }}\" style=\"border:2px dashed #C8CDCF; border-radius:16px; background:#FAFBFB; padding:46px 24px; text-align:center; margin-bottom:18px;\">\n                  <span style=\"width:56px; height:56px; border-radius:14px; background:rgba(173,185,223,.18); color:#48569C; display:grid; place-items:center; margin:0 auto 14px;\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 10l5 5 5-5M12 15V3\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <div style=\"font-size:16px; font-weight:800; color:#232627; margin-bottom:4px;\">Arrastrá tus archivos acá<\u002Fdiv>\n                  <div style=\"font-size:13px; color:#8A8F91; margin-bot tyle=\"{{ d.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n              <!-- carpetas con más actividad -->\n              <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); overflow:hidden;\">\n                <div style=\"padding:16px 22px; border-bottom:1px solid #EDEFF1; font-size:13px; font-weight:800; color:#232627;\">Carpetas con más actividad<\u002Fdiv>\n                <sc-for list=\"{{ govTopFolders }}\" as=\"f\" hint-placeholder-count=\"5\">\n                  <div onclick=\"{{ f.onClick }}\" style=\"display:flex; align-items:center; gap:12px; padding:12px 22px; border-bottom:1px solid #F4F5F6; cursor:pointer;\">\n                    <span style=\"width:30px; height:30px; border-radius:8px; background:#F2F4F5; display:grid; place-items:center; flex-shrink:0;\">{{ f.iconEl }}<\u002Fspan>\n                    <div style=\"flex:1; min-width:0;\"><div style=\"font-size:13px; font-weight:700; color:#37393A;\">{{ f.name }}<\u002Fdiv><div style=\"font-size:11px; color:#AEB3B5;\">{{ f.n }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-size:11.5px; font-weight:700; color:#48569C;\">{{ f.act }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <!-- importaciones recientes -->\n              <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); overflow:hidden;\">\n                <div style=\"padding:16px 22px; border-bottom:1px solid #EDEFF1; font-size:13px; font-weight:800; color:#232627;\">Importaciones recientes<\u002Fdiv>\n                <sc-for list=\"{{ govImports }}\" as=\"i\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex; align-items:center; gap:12px; padding:12px 22px; border-bottom:1px solid #F4F5F6;\">\n                    <span style=\"width:30px; height:30px; border-radius:8px; background:#E3F1F1; color:#2E8B8B; display:grid; place-items:center; flex-shrink:0;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 10l5 5 5-5M12 15V3\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                    <div style=\"flex:1; min-width:0;\"><div style=\"font-size:13px; font-weight:700; color:#37393A;\">{{ i.name }}<\u002Fdiv><div style=\"font-size:11px; color:#AEB3B5;\">{{ i.by }} · {{ i.count }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-size:11px; color:#AEB3B5;\">{{ i.when }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ USUARIOS Y ROLES ============ -->\n        <sc-if value=\"{{ isUsers }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:1080px; margin:0 auto; padding:26px 32px 60px;\">\n            <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:22px;\">\n              <div>\n                <div style=\"font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8A8F91; margin-bottom:5px;\">Administración<\u002Fdiv>\n                <div style=\"font-size:25px; font-weight:800; color:#232627;\">Usuarios y roles<\u002Fdiv>\n                <div style=\"font-size:13px; color:#8A8F91; margin-top:5px;\">Quién accede al conocimiento y qué puede hacer. Los permisos por carpeta se ajustan en cada carpeta.<\u002Fdiv>\n              <\u002Fdiv>\n              <button style=\"display:inline-flex; align-items:center; gap:8px; height:42px; padding:0 18px; border:none; border-radius:10px; background:#37393A; color:#fff; font-size:13.5px; font-weight:700; font-family:inherit; cursor:pointer;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M19 8v6M22 11h-6\"><\u002Fpath><\u002Fsvg>Invitar usuario<\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- roles -->\n            <div style=\"font-size:13px; font-weight:800; color:#232627; margin-bottom:12px;\">Roles<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:14px; margin-bottom:30px;\">\n              <sc-for list=\"{{ orgRoles }}\" as=\"r\" hint-placeholder-count=\"5\">\n                <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.05); padding:18px 20px;\">\n                  <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:10px;\">\n                    <span style=\"{{ r.iconStyle }}\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                    <div style=\"flex:1; min-width:0;\"><div style=\"font-size:14px; font-weight:800; color:#232627;\">{{ r.name }}<\u002Fdiv><div style=\"font-size:11.5px; color:#8A8F91;\">{{ r.members }} · {{ r.scope }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px; line-height:1.5; color:#6A6E70; margin-bottom:12px;\">{{ r.desc }}<\u002Fdiv>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:6px;\">\n                    <sc-for list=\"{{ r.caps }}\" as=\"c\" hint-placeholder-count=\"3\"><span style=\"font-size:10.5px; font-weight:700; color:#48569C; background:rgba(173,185,223,.16); border:1px solid #D2CFE6; padding:3px 9px; border-radius:6px;\">{{ c }}<\u002Fspan><\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- usuarios -->\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;\"><div style=\"font-size:13px; font-weight:800; color:#232627;\">Usuarios<\u002Fdiv><span style=\"font-size:12px; color:#8A8F91;\">{{ orgUsersCount }} usuarios<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); overflow:hidden;\">\n              <div style=\"display:grid; grid-template-columns:2.2fr 1.3fr 1fr 1fr; gap:14px; padding:11px 22px; background:#FAFBFB; border-bottom:1px solid #EDEFF1; font-size:10.5px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:#8A8F91;\">\n                <span>Usuario<\u002Fspan><span>Rol<\u002Fspan><span>Estado<\u002Fspan><span>Último acceso<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ orgUsers }}\" as=\"u\" hint-placeholder-count=\"5\">\n                <div style=\"display:grid; grid-template-columns:2.2fr 1.3fr 1fr 1fr; gap:14px; padding:13px 22px; align-items:center; border-bottom:1px solid #F4F5F6;\">\n                  <div style=\"display:flex; align-items:center; gap:11px; min-width:0;\"><span style=\"{{ u.avatarStyle }}\">{{ u.avatar }}<\u002Fspan><div style=\"min-width:0;\"><div style=\"font-size:13px; font-weight:700; color:#37393A; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ u.name }}<\u002Fdiv><div style=\"font-size:11px; color:#AEB3B5; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ u.email }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                  <div><span style=\"{{ u.roleStyle }}\">{{ u.role }}<\u002Fspan><\u002Fdiv>\n                  <div><span style=\"{{ u.estadoStyle }}\">{{ u.estado }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:12px; color:#8A8F91;\">{{ u.last }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px; color:#AEB3B5; margin-top:12px;\">Los permisos efectivos de cada persona resultan de su rol más los accesos específicos que tenga en cada carpeta.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ TYTO (asistente embebido) ============ -->\n        <sc-if value=\"{{ isTyto }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"height:100%; min-height:0; background:#fff;\">\n            <dc-import name=\"Tyto - Asistente\" embedded=\"{{ true }}\" hint-size=\"100%,100%\" style=\"display:block; height:100%;\"><\u002Fdc-import>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== STEP 1 · NUEVO PROCESO ===== -->\n        <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"max-width:1200px; margin:0 auto; padding:28px 30px;\">\n            <div style=\"margin-bottom:20px;\"><div style=\"font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8A8F91; margin-bottom:6px;\">Paso 1 · Nuevo documento<\u002Fdiv><div style=\"font-size:24px; font-weight:800; color:#232627;\">Creemos un documento desde sus evidencias<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:1.12fr 1fr; gap:20px; align-items:start;\">\n\n              <!-- form -->\n              <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:22px 24px;\">\n                <div style=\"font-size:12.5px; font-weight:700; color:#232627; margin-bottom:7px;\">Nombre del documento <span style=\"color:#CB4242;\">*<\u002Fspan><\u002Fdiv>\n                <input value=\"{{ procName }}\" oninput=\"{{ onProcName }}\" placeholder=\"Ej: Recepción de mercadería\" style=\"width:100%; height:46px; border:1px solid #D2D6D8; border-radius:10px; padding:0 14px; font-size:15px; font-weight:600; color:#232627; font-family:inherit; outline:none; margin-bottom:20px;\">\n\n                <div style=\"font-size:12.5px; font-weight:700; color:#232627; margin-bottom:8px;\">Guardar en <span style=\"color:#CB4242;\">*<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:12px; border:1px solid #D2D6D8; border-radius:10px; padding:11px 14px;\">\n                  <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#48569C\" stroke-width=\"2\" style=\"flex-shrink:0;\"><path d=\"M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n                  <span style=\"flex:1; font-size:14px; font-weight:700; color:#232627; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ selectedFolder }}<\u002Fspan>\n                  <button onclick=\"{{ onOpenFolderModal }}\" style=\"height:34px; padding:0 16px; border-radius:8px; border:1px solid #ADB9DF; background:rgba(173,185,223,.12); color:#48569C; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; flex-shrink:0;\">Cambiar<\u002Fbutton>\n                <\u002Fdiv>\n\n                <div style=\"height:1px; background:#EDEFF1; margin:22px 0 18px;\"><\u002Fdiv>\n\n                <div style=\"font-size:12.5px; font-weight:700; color:#232627; margin-bottom:7px;\">Información que la IA debería tener en cuenta <span style=\"font-weight:500; color:#8A8F91;\">(opcional)<\u002Fspan><\u002Fdiv>\n                <textarea value=\"{{ contexto }}\" oninput=\"{{ onContexto }}\" placeholder=\"Contale a la IA lo que no se ve en las evidencias…\" style=\"width:100%; min-height:88px; resize:vertical; border:1px solid #D2D6D8; border-radius:10px; padding:11px 13px; font-size:13.5px; line-height:1.5; color:#37393A; font-family:inherit; outline:none;\"><\u002Ftextarea>\n                <div style=\"display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-top:9px;\">\n                  <span style=\"font-size:11px; color:#8A8F91;\">Ejemplos:<\u002Fspan>\n                  <sc-for list=\"{{ contextExamples }}\" as=\"ex\" hint-placeholder-count=\"3\"><button onclick=\"{{ ex.onClick }}\" style=\"font-size:11.5px; color:#48569C; background:rgba(173,185,223,.16); border:1px solid #D2CFE6; border-radius:999px; padding:4px 11px; font-family:inherit; cursor:pointer;\">{{ ex.text }}<\u002Fbutton><\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"font-size:11.5px; line-height:1.4; color:#AEB3B5; margin-top:9px;\">Es solo una ayuda para la IA, no es obligatorio. La descripción y el resto la infiere automáticamente al crear el borrador.<\u002Fdiv>\n\n                <div style=\"height:1px; background:#EDEFF1; margin:20px 0 0;\"><\u002Fdiv>\n                <button onclick=\"{{ onToggleAdvanced }}\" style=\"display:flex; align-items:center; gap:9px; width:100%; background:none; border:none; padding:14px 0 0; cursor:pointer; font-family:inherit; text-align:left;\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8A8F91\" stroke-width=\"2.2\" style=\"{{ advChevronStyle }}\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n                  <span style=\"font-size:13px; font-weight:700; color:#4C4F51;\">Opciones avanzadas<\u002Fspan>\n                  <span style=\"font-size:11.5px; color:#AEB3B5;\">normalmente no hace falta tocarlas<\u002Fspan>\n                <\u002Fbutton>\n                <sc-if value=\"{{ advancedOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div class=\"msg-anim\" style=\"margin-top:14px;\">\n                    <div style=\"font-size:12.5px; font-weight:700; color:#232627; margin-bottom:8px;\">Nivel de detalle<\u002Fdiv>\n                    <div style=\"position:relative;\">\n   <button onclick=\"{{ onToggleRegen }}\" style=\"display:flex; align-items:center; gap:10px; width:100%; background:none; border:none; padding:12px 14px; cursor:pointer; font-family:inherit; text-align:left;\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#48569C\" stroke-width=\"2\" style=\"flex-shrink:0;\"><path d=\"M3 2v6h6\"><\u002Fpath><path d=\"M3.51 15a9 9 0 1 0 2.13-9.36L3 8\"><\u002Fpath><\u002Fsvg>\n                <div style=\"flex:1; min-width:0;\"><div style=\"font-size:14px; font-weight:800; color:#232627;\">Regenerar con instrucciones<\u002Fdiv><div style=\"font-size:11.5px; color:#8A8F91;\">¿Querés cambiar el enfoque? La IA lo rehace con las mismas evidencias.<\u002Fdiv><\u002Fdiv>\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8A8F91\" stroke-width=\"2.2\" style=\"{{ regenChevronStyle }}\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <sc-if value=\"{{ regenOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div class=\"msg-anim\" style=\"padding:4px 14px 14px;\">\n                  <div style=\"font-size:12px; line-height:1.45; color:#8A8F91; margin-bottom:14px;\">Reemplaza el borrador actual — no crea versiones.<\u002Fdiv>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:7px; margin-bottom:13px;\">\n                    <sc-for list=\"{{ regenItems }}\" as=\"ri\" hint-placeholder-count=\"6\">\n                      <button onclick=\"{{ ri.onClick }}\" style=\"{{ ri.style }}\">{{ ri.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; gap:10px;\">\n                    <input value=\"{{ regenText }}\" oninput=\"{{ onRegenText }}\" placeholder=\"O escribí una instrucción para el modelo…\" style=\"flex:1; height:44px; border:1px solid #D2D6D8; border-radius:10px; padding:0 14px; font-size:13.5px; color:#37393A; font-family:inherit; outline:none;\">\n                    <button onclick=\"{{ onRegenerate }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:44px; padding:0 18px; border:none; border-radius:10px; background:#48569C; color:#fff; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; flex-shrink:0;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M3 2v6h6\"><\u002Fpath><path d=\"M3.51 15a9 9 0 1 0 2.13-9.36L3 8\"><\u002Fpath><\u002Fsvg>Regenerar<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- preparar siguiente paso -->\n            <div style=\"display:flex; align-items:flex-start; gap:11px; background:#FAFBFC; border:1px solid #EDEFF1; border-radius:12px; padding:14px 16px;\">\n              <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9A6A00\" stroke-width=\"2\" style=\"flex-shrink:0; margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font-size:12.5px; line-height:1.5; color:#6A6E70;\">Tenés un <strong style=\"color:#37393A;\">borrador editable<\u002Fstrong>, todavía no es un documento oficial. El próximo paso es la <strong style=\"color:#37393A;\">aprobación<\u002Fstrong>; recién ahí arranca el versionado y, después, la <strong style=\"color:#37393A;\">red documental<\u002Fstrong>.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== STEP 3 · APROBACIÓN ===== -->\n        <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:720px; margin:0 auto; padding:28px 30px;\">\n            <div style=\"margin-bottom:18px;\"><div style=\"font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8A8F91; margin-bottom:6px;\">Paso 3 · Enviar a aprobación<\u002Fdiv><div style=\"font-size:24px; font-weight:800; color:#232627;\">Enviá el documento al circuito de aprobación<\u002Fdiv><\u002Fdiv>\n\n            <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px;\">\n                <span style=\"width:38px; height:38px; border-radius:10px; background:rgba(173,185,223,.2); color:#48569C; display:grid; place-items:center; flex-shrink:0;\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#48569C\" stroke-width=\"2\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"flex:1;\"><div style=\"font-size:16px; font-weight:800; color:#232627;\">Cierre de caja<\u002Fdiv><div style=\"font-size:12px; color:#8A8F91;\">Borrador · en {{ selectedFolder }}<\u002Fdiv><\u002Fdiv>\n                <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:#6A6E70; background:#F2F4F5; border:1px solid #E5E8EA; padding:4px 10px; border-radius:999px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#AEB3B5;\"><\u002Fspan>Borrador<\u002Fspan>\n              <\u002Fdiv>\n\n              <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:20px 22px; margin-bottom:16px;\">\n                <div style=\"font-size:14px; font-weight:800; color:#232627; margin-bottom:2px;\">Aprobadores disponibles<\u002Fdiv>\n                <div style=\"font-size:12px; color:#8A8F91; margin-bottom:14px;\">Según la carpeta <strong style=\"color:#6A6E70;\">{{ selectedFolder }}<\u002Fstrong> y los permisos. Elegí uno o varios.<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:8px;\">\n                  <sc-for list=\"{{ approverList }}\" as=\"ap\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ ap.onToggle }}\" style=\"{{ ap.rowStyle }}\">\n                      <span style=\"{{ ap.checkStyle }}\"><sc-if value=\"{{ ap.sel }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if><\u002Fspan>\n                      <span style=\"width:32px; height:32px; border-radius:50%; background:#48569C; color:#fff; display:grid; place-items:center; font-size:11px; font-weight:700; flex-shrink:0;\">{{ ap.initials }}<\u002Fspan>\n                      <span style=\"flex:1; text-align:left;\"><span style=\"display:block; font-size:13.5px; font-weight:700; color:#232627;\">{{ ap.name }}<\u002Fspan><span style=\"display:block; font-size:11.5px; color:#8A8F91;\">{{ ap.role }}<\u002Fspan><\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); padding:20px 22px; margin-bottom:16px;\">\n                <div style=\"font-size:13px; font-weight:700; color:#232627; margin-bottom:8px;\">Comentario para los aprobadores <span style=\"font-weight:500; color:#8A8F91;\">(opcional)<\u002Fspan><\u002Fdiv>\n                <textarea value=\"{{ approvalComment }}\" oninput=\"{{ onApprovalComment }}\" placeholder=\"Ej: Revisar especialmente el procedimiento de arqueo.\" style=\"width:100%; min-height:70px; resize:vertical; border:1px solid #D2D6D8; border-radius:10px; padding:11px 13px; font-size:13.5px; line-height:1.5; color:#37393A; font-family:inherit; outline:none;\"><\u002Ftextarea>\n              <\u002Fdiv>\n\n              <div style=\"display:flex; align-items:flex-start; gap:10px; background:#FAFBFC; border:1px solid #EDEFF1; border-radius:12px; padding:13px 16px;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9A6A00\" stroke-width=\"2\" style=\"flex-shrink:0; margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg><div style=\"font-size:12.5px; line-height:1.5; color:#6A6E70;\">El documento queda <strong style=\"color:#37393A;\">en revisión<\u002Fstrong> hasta que un aprobador lo apruebe. El versionado oficial empieza recién ahí.<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n              <div class=\"msg-anim\" style=\"background:#fff; border:1px solid #E5E8EA; border-radius:14px; box-shadow:0 1px 3px rgba(20,28,33,.06); overflow:hidden;\">\n                <div style=\"padding:24px 26px; display:flex; align-items:center; gap:13px; border-bottom:1px solid #EDEFF1;\">\n                  <span style=\"width:44px; height:44px; border-radius:50%; background:#1F8A55; display:grid; place-items:center; flex-shrink:0;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <div><div style=\"font-size:18px; font-weight:800; color:#232627;\">El documento quedó enviado a aprobación<\u002Fdiv><div style=\"font-size:12.5px; color:#8A8F91;\">Cierre de caja · en revisión<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:22px 26px;\">\n                  <div style=\"font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#8A8F91; margin-bottom:10px;\">Aprobadores seleccionados<\u002Fdiv>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:22px;\">\n                    <sc-for list=\"{{ selectedApprovers }}\" as=\"ap\" hint-placeholder-count=\"2\">\n                      <span style=\"display:inline-flex; align-items:center; gap:8px; border:1px solid #E5E8EA; border-radius:999px; padding:5px 12px 5px 5px;\"><span style=\"width:24px; height:24px; border-radius:50%; background:#48569C; color:#fff; display:grid; place-items:center; font-size:10px; font-weight:700;\">{{ ap.initials }}<\u002Fspan><span style=\"font-size:13px; font-weight:600; color:#37393A;\">{{ ap.name }}<\u002Fspan><\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"font-size:13px; font-weight:700; color:#232627; margin-bottom:11px;\">Cuando alguno lo apruebe:<\u002Fdiv>\n                  <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                    <div style=\"display:flex; align-items:flex-start; gap:11px;\"><span style=\"width:26px; height:26px; border-radius:7px; background:rgba(124,195,156,.22); color:#2E6E4D; display:grid; place-items:center; flex-shrink:0;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2E6E4D\" stroke-width=\"2\"><path d=\"M9 12l2 2 4-4\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg><\u002Fspan><div style=\"font-size:13.5px; line-height:1.4; color:#37393A; padding-top:3px;\">Se convierte en la <strong>versión oficial<\u002Fstrong> (arranca el versionado).<\u002Fdiv><\u002Fdiv>\n                    <div style=\"display:flex; align-items:flex-start; gap:11px;\"><span style=\"width:26px; height:26px; border-radius:7px; background:#37393A; display:grid; place-items:center; flex-shrink:0; margin-top:0;\"><span style=\"position:relative; width:13px; height:13px;\"><span style=\"position:absolute; inset:0; border-radius:50%; background:#ADB9DF;\"><\u002Fspan><span style=\"position:absolute; inset:4px; border-radius:50%; background:#fff;\"><\u002Fspan><\u002Fspan><\u002Fspan><div style=\"font-size:13.5px; line-height:1.4; color:#37393A; padding-top:3px;\">Queda <strong>disponible para Tyto<\u002Fstrong> como fuente oficial.<\u002Fdiv><\u002Fdiv>\n                    <div style=\"display:flex; align-items:flex-start; gap:11px;\"><span style=\"width:26px; height:26px; border-radius:7px; background:rgba(173,185,223,.26); color:#48569C; display:grid; place-items:center; flex-shrink:0;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"#48569C\" stroke-width=\"3.4\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"13\" r=\"3.2\"><\u002Fcircle><circle cx=\"11\" cy=\"35\" r=\"3.2\"><\u002Fcircle><circle cx=\"37\" cy=\"24\" r=\"3.2\"><\u002Fcircle><path d=\"M14 14l20 9M14 34l20 -9\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"font-size:13.5px; line-height:1.4; color:#37393A; padding-top:3px;\">La IA genera automáticamente las <strong>relaciones sugeridas<\u002Fstrong> para la red documental.<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:16px 26px; background:#FAFBFC; border-top:1px solid #EDEFF1; display:flex; align-items:center; gap:12px; flex-wrap:wrap;\">\n                  <div style=\"flex:1; min-width:240px; display:flex; align-items:center; gap:10px;\">\n                    <span style=\"display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700; color:#9A6A00; background:#FBF3DD; border:1px solid #F0DCA0; padding:5px 11px; border-radius:999px; flex-shrink:0;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#9A6A00;\"><\u002Fspan>Pendiente de aprobación<\u002Fspan>\n                    <span style=\"font-size:11.5px; line-height:1.4; color:#8A8F91;\">Mientras esté pendiente no podrá editarse.<\u002Fspan>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ onWithdraw }}\" style=\"display:inline-flex; align-items:center; gap:7px; height:40px; padding:0 15px; border:1px solid #D2D6D8; border-radius:10px; background:#fff; color:#4C4F51; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; flex-shrink:0;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6A6E70\" stroke-width=\"2\"><path d=\"M3 2v6h6\"><\u002Fpath><path d=\"M3.51 15a9 9 0 1 0 2.13-9.36L3 8\"><\u002Fpath><\u002Fsvg>Retirar solicitud<\u002Fbutton>\n                  <button onclick=\"{{ onPrimary }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:40px; padding:0 16px; border:none; border-radius:10px; background:#1F8A55; color:#fff; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; flex-shrink:0;\">Volver a documentos<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== STEP 4 · RELACIONES (interactivo) ===== -->\n        <sc-if value=\"{{ isStep4 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:22px 30px;\">\n            <div style=\"margin-bottom:16px;\"><div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px;\"><span style=\"font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:#fff; background:#9A6A00; padding:2px 8px; border-radius:5px;\">Sistema<\u002Fspan><span style=\"font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8A8F91;\">Paso 4 · Relaciones sugeridas<\u002Fspan><\u002Fdiv><div style=\"font-size:24px; font-weight:800; color:#232627;\">Generadas automáticamente al aprobar <span style=\"font-size:14px; font-weight:600; color:#8A8F91;\">— revisá y confirmá<\u002Fspan><\u002Fdiv><div style=\"font-size:13px; color:#6A6E70; margin-top:7px;\">Al aprobarse el documento, la IA propuso estas relaciones con estado <strong style=\"color:#9A6A00;\">Sugeridas<\u002Fstrong>. Tyto ya puede usar el documento; la confirmación deja de ser un cuello de botella.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff; border:1.5px solid #ADB9DF; border-radius:16px; box-shadow:0 12px 34px rgba(20,28,33,.10); overflow:hidden; height:600px; display:flex;\">\n              <!-- review list -->\n              <div style=\"width:466px; flex-shrink:0; border-right:1px solid #EDEFF1; display:flex; flex-direction:column;\">\n                <div style=\"padding:18px 22px 13px; border-bottom:1px solid #EDEFF1;\">\n                  <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:6px;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#48569C\" stroke-width=\"2\"><path d=\"M5 3l1.5 4L11 8.5 6.5 10 5 14l-1.5-4L1 8.5 5.5 7z\"><\u002Fpath><path d=\"M18 13l.9 2.4L21 16l-2.1.6L18 19l-.9-2.4L15 16l2.1-.6z\"><\u002Fpath><\u002Fsvg><span style=\"font-size:16px; font-weight:800; color:#232627;\">Detectamos {{ total }} relaciones<\u002Fspan><\u002Fdiv>\n                  <p style=\"margin:0 0 12px; font-size:12.5px; line-height:1.45; color:#6A6E70;\"><strong style=\"color:#48569C;\">Confirmá todo<\u002Fstrong> lo evidente de una vez; revisá solo los casos especiales.<\u002Fp>\n                  <div style=\"display:flex; align-items:center; gap:10px;\">\n                    <button onclick=\"{{ confirmAll }}\" style=\"flex:1; height:42px; border-radius:11px; border:none; background:#1F8A55; color:#fff; font-size:14px; font-weight:700; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Confirmar todo<sc-if value=\"{{ hasBulk }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-weight:600; opacity:.85;\">&nbsp;({{ pendingBulk }})<\u002 ivos(),\n    fileModalOpen: false,\n    fmTipo: 'Audio',\n    fmMode: 'import',\n    fmDesc: '',\n    fmFileName: '',\n    fmSaving: false,\n    fmStep: 0,\n    recOpen: false,\n    recPhase: 'idle',\n    recSecs: 0,\n    recStep: 0,\n    recDesc: '',\n    folderModalOpen: false,\n    creatingUnder: null,\n    nfName: '',\n    draftEditing: false,\n    draftText: 'Procedimiento para el cierre de caja diario en la estación. Aplica al turno que cierra la jornada.\\n\\n1 · Arqueo de efectivo\\nContá el efectivo en presencia del supervisor y registralo en la planilla de cierre.\\n\\n2 · Cierre de lote POS\\nEjecutá el cierre de lote en el POS (F4 → Cierre) y verificá el total contra el sistema.\\n\\n3 · Registrar diferencias\\nSi hay diferencias, dejá constancia y avisá al supervisor antes de retirarte.',\n    regenSel: {},\n    regenText: '',\n    regenerating: false,\n    regenDone: false,\n    regenOpen: false,\n    evidsOpen: false,\n    approvers: [\n      { id:'lucia', name:'Lucía Gómez', role:'Gerente', initials:'LG', sel:true },\n      { id:'juan', name:'Juan Pérez', role:'Supervisor de turno', initials:'JP', sel:true },\n      { id:'pablo', name:'Pablo Rodríguez', role:'Dueño', initials:'PR', sel:false },\n    ],\n    sentToApproval: false,\n    approvalComment: '',\n    docStatus: 'pendiente',\n    relations: this.initialRelations(),\n    editingId: null,\n    asked: false,\n    askedQuestion: '',\n    questionText: '',\n    sourcesOpen: false,\n    reported: false,\n  };\n\n  componentDidMount() {\n    try {\n      const s = parseInt(localStorage.getItem('margay_proto_cierre_step') || '1', 10);\n      if (s >= 1 && s <= 6 && s !== this.state.step) this.setState({ step: s });\n    } catch (e) {}\n    if (!Array.isArray(this.state.libFolders) || !this.state.libFolders.length || !this.state.libFolders[0].gob) this.setState({ libFolders: this.initialFolders() });\n  }\n  _lastStep = 1;\n  componentDidUpdate() {\n    if (this._lastStep !== this.state.step) {\n
