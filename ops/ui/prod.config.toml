# Config real de deploy — process-ai UI prod. Se versiona: no contiene secretos (viven en Secret Manager).

[gcp]
project = "margay-platform-prod"
region = "us-central1"
artifact_repo = "margay-services"

[image]
name = "margay-process-ai-ui"
context = "."
dockerfile = "Dockerfile.ui"

[runtime]
type = "service"
name = "margay-process-ai-ui"
service_account = "process-ai-ui-sa@margay-platform-prod.iam.gserviceaccount.com"

[service]
cpu = "1"
memory = "512Mi"
timeout = "300s"
min_instances = 0
max_instances = 10
concurrency = 80
# UI pública (Next en navegador)
allow_unauthenticated = true

[env]
ENVIRONMENT = "prod"
NODE_ENV = "production"
NEXT_PUBLIC_COOKIE_DOMAIN = ".margaystudio.io"

# Build-time public env (NEXT_PUBLIC_*) para Next.js
[build_args]
NEXT_PUBLIC_ENVIRONMENT = "production"
NEXT_PUBLIC_API_URL = "https://api.process.margaystudio.io"
NEXT_PUBLIC_HUB_URL = "https://hub.margaystudio.io"
NEXT_PUBLIC_SITE_URL = "https://process.margaystudio.io"
NEXT_PUBLIC_SUPABASE_URL = "https://mqldatizgvmjqisuqabv.supabase.co"
