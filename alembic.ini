# Configuración de Alembic para process-ai-core.
#
# La URL de la base y el schema NO se hardcodean acá: `alembic/env.py` los toma
# de `process_ai_core.db.database` (DATABASE_URL / DATABASE_SCHEMA, vía .env),
# de modo que migraciones y app comparten exactamente la misma configuración.
#
# Uso:
#   alembic upgrade head                 # aplicar migraciones (online, requiere Postgres)
#   alembic revision --autogenerate -m "x"   # generar migración desde los modelos
#   alembic history / alembic current

[alembic]
script_location = alembic
prepend_sys_path = .
# Formato de los archivos de versión: <rev>_<slug>.py
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
